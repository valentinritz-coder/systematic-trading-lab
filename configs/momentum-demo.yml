symbol: DEMO
data:
  provider: csv
  path: ../data/samples/demo_ohlcv.csv
  interval: 1d
  start: 2024-01-01
  end: 2024-04-29
initial_cash: 1000.0
commission_fixed: 0.10
commission_rate: 0.001
spread: 0.0005
execution:
  mode: next_open
strategy:
  breakout_lookback: 20
  sma_period: 50
  stop_loss_pct: 0.02
  take_profit_pct: 0.04
  max_holding_bars: 15
output_dir: ../results
